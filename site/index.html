<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Simple Site</title>
  <meta name="description" content="A simple content-driven website.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 id="site-title">My Simple Site</h1>
      <p id="site-tagline" class="tagline">Welcome to my website</p>
      <nav id="site-nav" class="site-nav" aria-label="Primary"></nav>
    </div>
  </header>

  <main id="content" class="container" tabindex="-1" aria-live="polite"></main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="copyright-year"></span> <span id="footer-title">My Simple Site</span></p>
    </div>
  </footer>

  <script src="./script.js" type="module"></script>
</body>
</html>
